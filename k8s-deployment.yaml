apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-api
  namespace: default
  labels:
    app: cms-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cms-api
  template:
    metadata:
      labels:
        app: cms-api
    spec:
      containers:
      - name: cms-api
        image: your-registry/cms-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: cms-config
              key: db-url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: cms-secrets
              key: db-user
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cms-secrets
              key: db-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/ready
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cms-api-service
  namespace: default
  labels:
    app: cms-api
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: cms-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-config
  namespace: default
data:
  db-url: "jdbc:mysql://mysql-service:3306/cms_db"
---
apiVersion: v1
kind: Secret
metadata:
  name: cms-secrets
  namespace: default
type: Opaque
stringData:
  db-user: "cms_user"
  db-password: "your-secure-password"
